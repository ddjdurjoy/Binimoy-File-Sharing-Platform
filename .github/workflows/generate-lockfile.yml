name: Generate package-lock and build

on:
  workflow_dispatch: {}

jobs:
  generate-lock:
    name: Generate package-lock and run build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate package-lock only
        run: |
          npm ci --no-audit --no-fund || true
          npm install --package-lock-only --no-audit --no-fund

      - name: Install deps for build
        run: npm install --no-audit --no-fund

      - name: Run build
        run: |
          # try generate first, fallback to build
          npm run generate --if-present || npm run build

      - name: Commit package-lock.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json || true
          if ! git diff --quiet -- package-lock.json; then
            git commit -m "chore: add/update package-lock.json (generated by workflow)" || true
            git push
          else
            echo "No changes to package-lock.json"
          fi
